<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    canvas {
      max-width: 600px;
      margin: 30px auto;
      display: block;
    }
  </style>
</head>
<body>

  <h2>Gráfico de Temperatura e Umidade (Horário)</h2>
  <canvas id="linha"></canvas>

  <h2>Gráfico de Média por Mês</h2>
  <canvas id="barra"></canvas>

  <script>
    // o de linha
    const ctxLinha = document.getElementById('linha');

    new Chart(ctxLinha, {
      type: 'line',
      data: {
        labels: ["12:00", "13:00", "14:00", "15:00", "16:00", "17:00"],
        datasets: [
          {
            label: 'Temperatura',
            data: [30, 29, 28, 25, 22, 23],
            borderWidth: 2
          },
          {
            label: 'Umidade',
            data: [80, 82, 80, 85, 80, 83],
            borderWidth: 2
          }
        ]
      }
    });

    // o de barra
    const ctxBarra = document.getElementById('barra');

    new Chart(ctxBarra, {
      type: 'bar',
      data: {
        labels: ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun"],
        datasets: [
          {
            label: 'Temperatura Média',
            data: [22, 24, 27, 23, 20, 18],
            borderWidth: 1
          },
          {
            label: 'Umidade Média',
            data: [90, 89, 93, 87, 88, 82],
            borderWidth: 1
          }
        ]
      }
    });
  </script>

</body>
</html>
